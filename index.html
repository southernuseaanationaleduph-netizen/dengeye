<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DengEYE — App Showcase</title>
<style>
/* =====================================================
   RESET & ROOT
===================================================== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Segoe UI',system-ui,sans-serif}

/* =====================================================
   STAGE — full viewport, clips everything
===================================================== */
#stage{
  position:fixed;inset:0;
  overflow:hidden;
  background:#0a0a18;
}

/* =====================================================
   SCENE — each "slide" in the video
===================================================== */
.scene{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  opacity:0;
  pointer-events:none;
  transition:opacity 0s;
}
.scene.active{opacity:1;pointer-events:auto;}

/* animated BG gradient per scene */
.scene-bg{
  position:absolute;inset:0;
  transition:opacity 1s ease;
}

/* =====================================================
   PHONE MOCKUP
===================================================== */
.phone{
  position:relative;
  width:270px;height:540px;
  background:#111;
  border-radius:44px;
  border:2.5px solid rgba(255,255,255,0.13);
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.06),
    0 40px 120px rgba(0,0,0,0.7),
    0 0 80px rgba(255,255,255,0.03);
  overflow:hidden;
  flex-shrink:0;
}
/* top shine */
.phone::before{
  content:'';position:absolute;
  top:0;left:12%;right:12%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.35),transparent);
  z-index:10;
}
/* notch */
.phone::after{
  content:'';position:absolute;
  top:10px;left:50%;transform:translateX(-50%);
  width:88px;height:24px;
  background:#111;border-radius:0 0 20px 20px;
  z-index:10;
}
.phone-screen{
  position:absolute;inset:0;
  overflow:hidden;border-radius:42px;
  background:#000;
}
.phone-img{
  position:absolute;inset:0;
  width:100%;height:100%;
  object-fit:cover;object-position:top center;
  border-radius:42px;
  will-change:transform,opacity;
}
.phone-home{
  position:absolute;bottom:8px;left:50%;transform:translateX(-50%);
  width:96px;height:4px;border-radius:2px;
  background:rgba(255,255,255,0.3);z-index:10;
}

/* =====================================================
   COPY PANEL (text beside phone)
===================================================== */
.copy{
  max-width:380px;
  color:#fff;
  will-change:transform,opacity;
}
.copy-eyebrow{
  font-size:10px;letter-spacing:.18em;text-transform:uppercase;
  font-weight:700;margin-bottom:14px;
  opacity:.65;
}
.copy-title{
  font-size:clamp(28px,4.5vw,52px);
  font-weight:800;line-height:1.05;
  letter-spacing:-0.025em;
  margin-bottom:16px;
}
.copy-body{
  font-size:15px;line-height:1.75;
  color:rgba(255,255,255,0.68);
  margin-bottom:24px;
}
.copy-pills{
  display:flex;flex-wrap:wrap;gap:8px;
}
.pill{
  display:inline-block;
  padding:6px 14px;border-radius:100px;
  font-size:11px;font-weight:600;letter-spacing:.04em;
  background:rgba(255,255,255,0.1);
  border:1px solid rgba(255,255,255,0.15);
  color:rgba(255,255,255,0.8);
  backdrop-filter:blur(4px);
}

/* =====================================================
   SCENE LAYOUTS
===================================================== */
/* SPLASH — centered phone, big title above */
.scene--splash{flex-direction:column;gap:40px;text-align:center;}
.scene--splash .copy{max-width:600px;}
.scene--splash .copy-title{font-size:clamp(48px,8vw,96px);text-align:center;}
.scene--splash .copy-body{text-align:center;font-size:17px;}

/* LEFT — phone left, copy right */
.scene--left{flex-direction:row;gap:80px;}
.scene--left .copy{order:2;}

/* RIGHT — copy left, phone right */
.scene--right{flex-direction:row;gap:80px;}
.scene--right .copy{order:1;}
.scene--right .phone{order:2;}

/* DUAL — two phones side by side */
.scene--dual{flex-direction:row;gap:48px;align-items:center;}
.scene--dual .phones{display:flex;gap:28px;align-items:flex-start;}
.scene--dual .phone:nth-child(2){margin-top:40px;}
.scene--dual .copy{max-width:300px;}

/* END — centered big CTA */
.scene--end{flex-direction:column;gap:32px;text-align:center;}
.scene--end .copy{max-width:640px;}
.scene--end .copy-title{font-size:clamp(36px,6vw,72px);}
.cta-btn{
  display:inline-flex;align-items:center;gap:10px;
  background:#fff;color:#111;
  font-weight:800;font-size:16px;letter-spacing:.01em;
  padding:16px 36px;border-radius:100px;
  border:none;cursor:pointer;
  box-shadow:0 8px 40px rgba(255,255,255,0.18);
  transition:transform .2s,box-shadow .2s;
  text-decoration:none;
}
.cta-btn:hover{transform:scale(1.04);box-shadow:0 12px 50px rgba(255,255,255,0.25);}

/* =====================================================
   PROGRESS BAR (bottom)
===================================================== */
#progress-bar{
  position:fixed;bottom:0;left:0;right:0;height:3px;z-index:999;
  background:rgba(255,255,255,0.08);
}
#progress-fill{
  height:100%;width:0%;
  background:linear-gradient(90deg,#4af,#a78bfa,#f472b6);
  transition:width linear;
  border-radius:0 2px 2px 0;
}

/* =====================================================
   SCENE COUNTER dots
===================================================== */
#scene-dots{
  position:fixed;right:24px;top:50%;transform:translateY(-50%);
  z-index:999;display:flex;flex-direction:column;gap:8px;
}
.sdot{
  width:6px;height:6px;border-radius:50%;
  background:rgba(255,255,255,0.25);
  transition:all .3s;cursor:pointer;
}
.sdot.on{
  background:#fff;
  height:22px;border-radius:3px;
}

/* =====================================================
   SCENE LABEL (top left)
===================================================== */
#scene-label{
  position:fixed;top:28px;left:40px;z-index:999;
  font-size:11px;letter-spacing:.16em;text-transform:uppercase;
  font-weight:700;color:rgba(255,255,255,0.45);
  transition:opacity .4s;
}

/* =====================================================
   PAUSE BUTTON
===================================================== */
#pause-btn{
  position:fixed;bottom:24px;right:24px;z-index:999;
  width:44px;height:44px;border-radius:50%;
  background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);
  color:#fff;font-size:16px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;backdrop-filter:blur(8px);
  transition:background .2s;
}
#pause-btn:hover{background:rgba(255,255,255,0.22);}

/* =====================================================
   KEYFRAME ANIMATIONS (JS-driven via classes)
===================================================== */

/* Phone entry animations */
@keyframes phoneSlideLeft{
  from{transform:translateX(110px) rotate(4deg);opacity:0;}
  to{transform:translateX(0) rotate(0deg);opacity:1;}
}
@keyframes phoneSlideRight{
  from{transform:translateX(-110px) rotate(-4deg);opacity:0;}
  to{transform:translateX(0) rotate(0deg);opacity:1;}
}
@keyframes phoneRise{
  from{transform:translateY(80px) scale(.88);opacity:0;}
  to{transform:translateY(0) scale(1);opacity:1;}
}
@keyframes phoneDrop{
  from{transform:translateY(-60px) scale(.92);opacity:0;}
  to{transform:translateY(0) scale(1);opacity:1;}
}
@keyframes phoneFloat{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-10px);}
}

/* Copy entry */
@keyframes copyRight{
  from{transform:translateX(50px);opacity:0;}
  to{transform:translateX(0);opacity:1;}
}
@keyframes copyLeft{
  from{transform:translateX(-50px);opacity:0;}
  to{transform:translateX(0);opacity:1;}
}
@keyframes copyUp{
  from{transform:translateY(40px);opacity:0;}
  to{transform:translateY(0);opacity:1;}
}

/* Screen swipe inside phone */
@keyframes imgSwipeLeft{
  from{transform:translateX(100%);opacity:0;}
  to{transform:translateX(0);opacity:1;}
}
@keyframes imgSwipeRight{
  from{transform:translateX(-100%);opacity:0;}
  to{transform:translateX(0);opacity:1;}
}
@keyframes imgFadeIn{
  from{opacity:0;transform:scale(1.04);}
  to{opacity:1;transform:scale(1);}
}

/* Touch ripple */
@keyframes ripple{
  0%{transform:translate(-50%,-50%) scale(0);opacity:.7;}
  100%{transform:translate(-50%,-50%) scale(3.5);opacity:0;}
}
.ripple-el{
  position:absolute;width:50px;height:50px;
  border-radius:50%;background:rgba(255,255,255,0.35);
  pointer-events:none;
  animation:ripple .6s ease-out forwards;
}

/* Swipe hand hint */
@keyframes swipeHand{
  0%{transform:translateX(0);opacity:1;}
  60%{transform:translateX(-28px);opacity:1;}
  100%{transform:translateX(-28px);opacity:0;}
}
.swipe-hand{
  position:absolute;bottom:60px;right:30px;font-size:26px;pointer-events:none;
  animation:swipeHand 1.1s ease-in-out forwards;
}

/* Background zoom/pan */
@keyframes bgZoom{
  from{transform:scale(1);}
  to{transform:scale(1.06);}
}

/* Particle dots floating (splash) */
.particle{
  position:absolute;border-radius:50%;
  background:rgba(255,255,255,0.06);
  animation:floatUp linear infinite;
}
@keyframes floatUp{
  0%{transform:translateY(0) scale(1);opacity:.4;}
  100%{transform:translateY(-100vh) scale(.3);opacity:0;}
}

/* =====================================================
   RESPONSIVE
===================================================== */
@media(max-width:900px){
  .scene--left,.scene--right{flex-direction:column;gap:36px;}
  .scene--left .copy,.scene--right .copy{order:1;text-align:center;max-width:400px;}
  .scene--left .phone,.scene--right .phone{order:2;}
  .copy-pills{justify-content:center;}
  .scene--dual .phones{gap:16px;}
  .scene--dual .phone{width:200px;height:400px;}
  .scene--dual .phone:nth-child(2){margin-top:28px;}
  #scene-dots{display:none;}
}
@media(max-width:600px){
  .phone{width:220px;height:440px;border-radius:36px;}
  .phone::after{width:72px;height:20px;}
  .copy-title{font-size:28px!important;}
  .scene--splash .copy-title{font-size:44px!important;}
}
</style>
</head>

/* =====================================================
   STATE
===================================================== */
let current    = 0;
let paused     = false;
let timer      = null;
let screenLoop = null;
let progTimer  = null;

/* =====================================================
   BUILD ALL SCENES INTO DOM
===================================================== */
function buildScenes(){
  const stage = document.getElementById('stage');
  const dots  = document.getElementById('scene-dots');

  // Floating particles for splash feel
  for(let i=0;i<18;i++){
    const p=document.createElement('div');
    p.className='particle';
    const sz=Math.random()*6+3;
    p.style.cssText=`
      width:${sz}px;height:${sz}px;
      left:${Math.random()*100}%;
      bottom:${Math.random()*40-10}%;
      animation-duration:${6+Math.random()*10}s;
      animation-delay:${Math.random()*8}s;
    `;
    stage.appendChild(p);
  }

  SCENES.forEach((sc, idx)=>{
    const el = document.createElement('div');
    el.className = `scene scene--${sc.layout}`;
    el.id = `scene-${idx}`;
    el.innerHTML = buildSceneHTML(sc, idx);
    stage.appendChild(el);

    // dot
    const d = document.createElement('div');
    d.className='sdot';
    d.addEventListener('click',()=>jumpTo(idx));
    dots.appendChild(d);
  });
}

function buildSceneHTML(sc, idx){
  // Background
  const bgHtml=`<div class="scene-bg" style="background:${sc.bg};position:absolute;inset:0;animation:bgZoom 6s ease-in-out alternate infinite;"></div>`;

  // Phone(s)
  const phoneHtml = buildPhoneHTML(sc, idx);

  // Copy
  const copyHtml=`
    <div class="copy" id="copy-${idx}">
      <div class="copy-eyebrow" style="color:${sc.accent}">${sc.eyebrow}</div>
      <div class="copy-title">${sc.title.replace(/\n/g,'<br>')}</div>
      <div class="copy-body">${sc.body}</div>
      <div class="copy-pills">${sc.pills.map(p=>`<span class="pill" style="border-color:${sc.accent}33;color:rgba(255,255,255,0.85)">${p}</span>`).join('')}</div>
      ${sc.layout==='end'?`<div style="margin-top:32px"><a class="cta-btn" href="https://bit.ly/DengEYE" target="_blank">📲 Download DengEYE</a></div>`:''}
    </div>`;

  if(sc.layout==='dual'){
    return `${bgHtml}
      <div class="phones">${phoneHtml}</div>
      ${copyHtml}`;
  }
  if(sc.layout==='splash'||sc.layout==='end'){
    return `${bgHtml}${copyHtml}${phoneHtml}`;
  }
  // left / right
  return `${bgHtml}${phoneHtml}${copyHtml}`;
}

function buildPhoneHTML(sc, idx){
  if(sc.layout==='dual'){
    // Two phones
    const [k1,k2,k3]=sc.screens;
    return `
      <div class="phone" id="phone-${idx}-0">
        <div class="phone-screen">
          <img class="phone-img" id="img-${idx}-0" src="${IMGS[k1]||''}" alt="">
        </div>
        <div class="phone-home"></div>
      </div>
      <div class="phone" id="phone-${idx}-1">
        <div class="phone-screen">
          <img class="phone-img" id="img-${idx}-1" src="${IMGS[k2]||IMGS[k1]||''}" alt="">
        </div>
        <div class="phone-home"></div>
      </div>`;
  }
  // Single phone
  return `
    <div class="phone" id="phone-${idx}">
      <div class="phone-screen">
        <img class="phone-img" id="img-${idx}" src="${IMGS[sc.screens[0]]||''}" alt="">
      </div>
      <div class="phone-home"></div>
    </div>`;
}

/* =====================================================
   ACTIVATE SCENE
===================================================== */
function activateScene(idx, dir){
  // Hide all
  document.querySelectorAll('.scene').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.sdot').forEach((d,i)=>d.classList.toggle('on',i===idx));

  const sc  = SCENES[idx];
  const el  = document.getElementById(`scene-${idx}`);
  const lbl = document.getElementById('scene-label');

  el.classList.add('active');
  lbl.textContent = sc.eyebrow.replace(/^[^—]*— /,'').replace(/Step \d+ — /,'');

  // Animate phone
  animatePhone(sc, idx);

  // Animate copy
  animateCopy(sc, idx);

  // Screen cycling inside phone
  clearScreenLoop();
  if(sc.screens.length>1 && sc.screenInterval>0){
    let si=0;
    screenLoop=setInterval(()=>{
      si=(si+1)%sc.screens.length;
      swipeScreen(sc,idx,si);
    }, sc.screenInterval);
  }

  // Occasionally show touch ripple
  if(sc.layout!=='splash'&&sc.layout!=='end'){
    setTimeout(()=>showRipple(sc,idx), 900);
    setTimeout(()=>showRipple(sc,idx), 3200);
    if(sc.screens.length>1) setTimeout(()=>showSwipeHint(sc,idx),1400);
  }
}

function animatePhone(sc, idx){
  const phone = document.getElementById(`phone-${idx}`);
  const phone0= document.getElementById(`phone-${idx}-0`);
  const phone1= document.getElementById(`phone-${idx}-1`);

  const anims={
    slideLeft: 'phoneSlideLeft .75s cubic-bezier(.22,1,.36,1) both',
    slideRight:'phoneSlideRight .75s cubic-bezier(.22,1,.36,1) both',
    rise:      'phoneRise .8s cubic-bezier(.22,1,.36,1) both',
    drop:      'phoneDrop .7s cubic-bezier(.22,1,.36,1) both',
  };
  const anim = anims[sc.phoneAnim]||anims.rise;

  if(phone){
    phone.style.animation='none';
    void phone.offsetWidth;
    phone.style.animation=anim;
    // float after entry
    setTimeout(()=>{
      phone.style.animation='phoneFloat 4s ease-in-out infinite';
    },900);
  }
  if(phone0){
    phone0.style.animation='none'; void phone0.offsetWidth;
    phone0.style.animation='phoneSlideLeft .75s .05s cubic-bezier(.22,1,.36,1) both';
    setTimeout(()=>{ phone0.style.animation='phoneFloat 4s ease-in-out infinite'; },1000);
  }
  if(phone1){
    phone1.style.animation='none'; void phone1.offsetWidth;
    phone1.style.animation='phoneSlideRight .75s .15s cubic-bezier(.22,1,.36,1) both';
    setTimeout(()=>{ phone1.style.animation='phoneFloat 4.5s .5s ease-in-out infinite'; },1100);
  }
}

function animateCopy(sc, idx){
  const copy = document.getElementById(`copy-${idx}`);
  if(!copy) return;
  const anims={
    right:'copyRight .7s .18s cubic-bezier(.22,1,.36,1) both',
    left: 'copyLeft .7s .18s cubic-bezier(.22,1,.36,1) both',
    up:   'copyUp .7s .22s cubic-bezier(.22,1,.36,1) both',
  };
  const anim = anims[sc.copyAnim]||anims.up;
  copy.style.animation='none'; void copy.offsetWidth;
  copy.style.animation=anim;
}

/* =====================================================
   SCREEN SWIPE INSIDE PHONE
===================================================== */
function swipeScreen(sc, idx, si){
  // single phone
  const img = document.getElementById(`img-${idx}`);
  // dual phones
  const img0= document.getElementById(`img-${idx}-0`);
  const img1= document.getElementById(`img-${idx}-1`);

  const key = sc.screens[si];
  const src = IMGS[key]||'';

  const swipeAnim='imgSwipeLeft .5s cubic-bezier(.22,1,.36,1) both';

  function swap(el, s){
    if(!el)return;
    el.style.animation='none'; void el.offsetWidth;
    el.src=s;
    el.style.animation=swipeAnim;
  }

  if(img){ swap(img,src); }
  if(img0&&img1){
    const key2=sc.screens[(si+1)%sc.screens.length];
    swap(img0,src);
    swap(img1,IMGS[key2]||src);
  }
}

/* =====================================================
   TOUCH RIPPLE SIMULATION
===================================================== */
function showRipple(sc,idx){
  const phone=document.getElementById(`phone-${idx}`)||document.getElementById(`phone-${idx}-0`);
  if(!phone)return;
  const r=document.createElement('div');
  r.className='ripple-el';
  // random position on phone screen
  const px=60+Math.random()*150;
  const py=180+Math.random()*200;
  r.style.left=px+'px'; r.style.top=py+'px';
  phone.querySelector('.phone-screen').appendChild(r);
  setTimeout(()=>r.remove(),700);
}

function showSwipeHint(sc,idx){
  const phone=document.getElementById(`phone-${idx}`)||document.getElementById(`phone-${idx}-0`);
  if(!phone)return;
  const h=document.createElement('div');
  h.className='swipe-hand'; h.textContent='👆';
  phone.querySelector('.phone-screen').appendChild(h);
  setTimeout(()=>h.remove(),1200);
}

/* =====================================================
   PROGRESS BAR
===================================================== */
function startProgress(duration){
  const fill=document.getElementById('progress-fill');
  fill.style.transition='none'; fill.style.width='0%';
  void fill.offsetWidth;
  fill.style.transition=`width ${duration}ms linear`;
  fill.style.width='100%';
}

/* =====================================================
   AUTO-ADVANCE
===================================================== */
function play(idx){
  current=idx;
  activateScene(idx);
  const sc=SCENES[idx];
  if(sc.duration===99999) return; // end scene, stop
  startProgress(sc.duration);
  clearMainTimer();
  timer=setTimeout(()=>{
    const next=(idx+1)%SCENES.length;
    play(next);
  }, sc.duration);
}

function jumpTo(idx){
  clearMainTimer(); clearScreenLoop();
  play(idx);
}

function clearMainTimer(){
  if(timer){clearTimeout(timer);timer=null;}
}
function clearScreenLoop(){
  if(screenLoop){clearInterval(screenLoop);screenLoop=null;}
}

/* =====================================================
   PAUSE / RESUME
===================================================== */
const pauseBtn=document.getElementById('pause-btn');
pauseBtn.addEventListener('click',()=>{
  paused=!paused;
  pauseBtn.textContent=paused?'▶':'⏸';
  if(paused){
    clearMainTimer(); clearScreenLoop();
    // freeze progress bar
    const fill=document.getElementById('progress-fill');
    const w=fill.offsetWidth/fill.parentElement.offsetWidth*100;
    fill.style.transition='none'; fill.style.width=w+'%';
  } else {
    play(current);
  }
});

/* =====================================================
   KEYBOARD
===================================================== */
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key===' ') jumpTo((current+1)%SCENES.length);
  if(e.key==='ArrowLeft') jumpTo((current-1+SCENES.length)%SCENES.length);
  if(e.key==='Escape') pauseBtn.click();
});

/* =====================================================
   BOOT
===================================================== */
window.addEventListener('DOMContentLoaded',()=>{
  buildScenes();
  play(0);
});
</script>
